name: CI-CD Docker

on:
  push:
    branches: [ main, dev ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: npm install
      - run: npm test
      - run: npm run lint

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build image
        run: docker build -t anju557/github-actions-project .
        
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
         image-ref: anju557/github-actions-project
         
      - name: Push image
        run: docker push anju557/github-actions-project


  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull anju557/github-actions-project
            if [ "${{ github.ref_name }}" = "main" ]; then
              echo "Deploying PROD"

              docker stop prod || true
              docker rm prod || true
              sudo fuser -k 8080/tcp || true

              docker run -d -p 8080:8080 \
                --name prod \
                anju557/github-actions-project

            else
              echo "Deploying DEV"

              docker stop dev || true
              docker rm dev || true
              sudo fuser -k 8081/tcp || true

              docker run -d -p 8081:8080 \
                --name dev \
                anju557/github-actions-project
            fi
