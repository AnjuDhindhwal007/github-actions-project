name: CI-CD Docker

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: npm install
      - run: npm test
      - run: npm run lint

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build image
        run: docker build -t anju557/github-actions-project .

      - name: Push image
        run: docker push anju557/github-actions-project


  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull anju557/github-actions-project
            docker stop github-actions-project || true
            docker rm github-actions-project || true
            docker run -d -p 8080:8080 --name github-actions-project anju557/github-actions-project